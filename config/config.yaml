artifacts_root: artifacts


data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://drive.google.com/file/d/1tWNqFpIMBtCJt678MBPtQgyzw3LnYqx6/view?usp=sharing
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion


data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt
  unzip_data_dir: artifacts/data_ingestion
  all_schema:
    LoanID: object
    Age: int64
    Income: int64
    LoanAmount: int64
    CreditScore: int64
    MonthsEmployed: int64
    NumCreditLines: int64
    InterestRate: float64
    LoanTerm: int64
    DTIRatio: float64
    Education: object
    EmploymentType: object
    MaritalStatus: object
    HasMortgage: object
    HasDependents: object
    LoanPurpose: object
    HasCoSigner: object
    Default: int64


data_preprocessing:
  root_dir: artifacts/data_preprocessing
  raw_data_dir: artifacts/data_ingestion
  input_file_name: Loan_default.csv
  processed_data_file: artifacts/data_preprocessing/processed_data.csv
  target_column: Default
  numeric_columns:
    - Age
    - Income
    - LoanAmount
    - CreditScore
    - MonthsEmployed
    - NumCreditLines
    - InterestRate
    - LoanTerm
    - DTIRatio
  categorical_columns:
    - Education
    - EmploymentType
    - MaritalStatus
    - HasMortgage
    - HasDependents
    - LoanPurpose
    - HasCoSigner
  drop_columns:
    - LoanID


data_transformation:
  root_dir: artifacts/data_transformation
  split_artifacts_dir: artifacts/data_transformation/split_data
  input_file_path: artifacts/data_preprocessing/processed_data.csv
  train_file_path: artifacts/data_transformation/split_data/train.csv
  validation_file_path: artifacts/data_transformation/split_data/validation.csv
  test_file_path: artifacts/data_transformation/split_data/test.csv
  test_size: 0.15
  validation_size: 0.15
  random_state: 42
  target_column: Default


model_training:
  root_dir: artifacts/model_training
  train_file_path: artifacts/data_transformation/split_data/train.csv
  validation_file_path: artifacts/data_transformation/split_data/validation.csv
  test_file_path: artifacts/data_transformation/split_data/test.csv
  model_file_path: artifacts/model_training/xgboost_model.pkl
  metrics_file_path: artifacts/model_training/model_metrics.json
  target_column: Default

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/split_data/test.csv
  model_path: artifacts/model_training/xgboost_model.pkl
  metric_file_name: artifacts/model_evaluation/model_evaluation_metrics.json
  target_column: Default
  mlflow_uri: https://dagshub.com/ajaychaudhary8104/End_to_End_ML_project_for_Loan_Default_Prediction.mlflow
  